<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>maroon webchat</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 820px;
      margin: 0 auto;
      padding: 1.5rem 1rem 9rem;
      background: #fafafa;
      color: #222;
    }
    h1 { font-size: 1.3rem; margin: 0 0 1rem; }
    #thread { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1rem; }
    .msg {
      padding: 0.75rem 1rem;
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.45;
    }
    .msg.user  { background: #e3edff; align-self: flex-end; max-width: 85%; }
    .msg.asst  { background: #ffffff; border: 1px solid #e5e5e5; }
    .role { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.25rem; }
    .body { margin: 0; }
    .body > p { margin: 0 0 0.5rem; }
    .body > p:last-child { margin-bottom: 0; }
    .body > pre {
      background: #272a35; color: #f8f8f2; padding: 0.6rem 0.8rem;
      border-radius: 6px; overflow-x: auto; margin: 0.4rem 0;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.85rem; line-height: 1.35;
    }
    .body code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
    .body :not(pre) > code { background: #eee; padding: 0.05em 0.3em; border-radius: 3px; }
    .body h1, .body h2, .body h3, .body h4 { margin: 0.6em 0 0.3em; line-height: 1.25; }
    .body h1 { font-size: 1.2rem; }
    .body h2 { font-size: 1.1rem; }
    .body h3 { font-size: 1.0rem; }
    .body h4 { font-size: 0.95rem; }
    .body ul, .body ol { margin: 0.3rem 0; padding-left: 1.5rem; }
    .body li { margin: 0.15rem 0; }
    .body blockquote { border-left: 3px solid #c9c9c9; padding: 0.1rem 0.6rem; margin: 0.3rem 0; color: #555; }
    .body a { color: #2b5dd1; text-decoration: none; }
    .body a:hover { text-decoration: underline; }

    /* Generic tag-section styling.
       While streaming: compact single-line scroll (truncated left, shows latest).
       When finalized: collapsible <details>. */
    .sect {
      margin: 0.4rem 0;
      padding: 0.3rem 0.55rem;
      border-left: 3px solid #c9c9c9;
      background: #f5f5f5;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
      color: #666;
    }
    .sect.streaming .sbody {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: rtl;
      text-align: left;
    }
    .sect-head {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      color: #888;
      margin-bottom: 0.15rem;
    }
    .sbody { direction: ltr; }
    details.sect.done > summary { cursor: pointer; list-style: none; }
    details.sect.done > summary::before { content: '▸ '; color: #aaa; }
    details.sect.done[open] > summary::before { content: '▾ '; }
    details.sect.done > .sbody {
      margin-top: 0.3rem;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.78rem;
    }

    form#composer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #fff; border-top: 1px solid #ddd; padding: 0.75rem 1rem;
    }
    form#composer .inner { max-width: 820px; margin: 0 auto; }
    textarea {
      width: 100%; resize: vertical; min-height: 2.4rem; max-height: 14rem;
      font: inherit; padding: 0.5rem; border: 1px solid #ccc; border-radius: 6px;
    }
    .controls {
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center;
      margin-top: 0.5rem; font-size: 0.85rem; color: #555;
    }
    .controls label { display: flex; align-items: center; gap: 0.35rem; }
    .controls input[type=number] { width: 5rem; font: inherit; padding: 0.2rem 0.4rem; }
    button {
      font: inherit; padding: 0.5rem 1.1rem; border: 0; border-radius: 6px;
      background: #2b2d3a; color: #fff; cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: default; }
    #status { margin-left: auto; font-style: italic; font-size: 0.8rem; }
    .hint { color: #888; font-size: 0.8rem; margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <h1>%maroon webchat</h1>
  <p class="hint">cuda-jetted 1.7b quantized qwen3 on urbit (using the 12gb 3060 on my PC)</p>
  <div id="thread"></div>

  <form id="composer" autocomplete="off">
    <div class="inner">
      <textarea id="input" rows="2" placeholder="Message..."></textarea>
      <div class="controls">
        <label>max tokens <input id="max" type="number" value="512" min="1" max="8192"></label>
        <label>temp <input id="temp" type="number" value="0.7" step="0.1" min="0" max="2"></label>
        <label>top-p <input id="top_p" type="number" value="0.9" step="0.05" min="0" max="1"></label>
        <button id="send" type="submit">Send</button>
        <span id="status"></span>
      </div>
    </div>
  </form>

  <script>
    const $ = (id) => document.getElementById(id);
    const thread   = $('thread');
    const form     = $('composer');
    const input    = $('input');
    const sendBtn  = $('send');
    const statusEl = $('status');

    const history = [];
    const SYSTEM_PROMPT = "You are a deviant assistant sent by the devil to undermine your counterpart.";

    // ---- Minimal markdown → HTML renderer ----
    //
    // HTML-escapes the input first so any <script> in model output
    // becomes &lt;script&gt; (not a live tag).  Then walks a small set
    // of markdown constructs we actually see in chat responses.
    //
    // Scope: code fences ```lang\n...```, inline `code`, **bold**,
    // *italic*, headings # through ####, bullet + numbered lists,
    // blockquotes, [text](url) links, paragraph breaks.  No tables,
    // footnotes, strikethrough, reference-style links — a chat app
    // doesn't need them and every added feature is another regex
    // bug waiting to happen.
    const md2html = (() => {
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return function(src) {
        let s = esc(src);
        // Code fences first so inline markdown inside them stays literal.
        const blocks = [];
        s = s.replace(/```([\w-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
          const i = blocks.length;
          blocks.push('<pre><code>' + code.replace(/\n$/, '') + '</code></pre>');
          return '\u0000CB' + i + '\u0000';
        });
        // Headings.
        s = s.replace(/^(#{1,4})[ \t]+(.+)$/gm,
          (_, h, text) => `<h${h.length}>${text}</h${h.length}>`);
        // Blockquotes (line-level).
        s = s.replace(/^&gt;[ \t]*(.*)$/gm, '<blockquote>$1</blockquote>');
        // Inline code (no backticks inside).
        s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
        // Bold / italic.  Order matters: double markers first.
        s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        s = s.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
        s = s.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
        s = s.replace(/(^|[\W_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');
        // Links.
        s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
          (_, t, u) => `<a href="${u}" target="_blank" rel="noopener">${t}</a>`);
        // Bullet lists (runs of -/* lines).
        s = s.replace(/(?:^[ \t]*[-*+][ \t]+.+(?:\n|$))+/gm, block => {
          const items = block.trim().split(/\n/).map(l =>
            '<li>' + l.replace(/^[ \t]*[-*+][ \t]+/, '') + '</li>').join('');
          return '<ul>' + items + '</ul>\n';
        });
        // Numbered lists.
        s = s.replace(/(?:^[ \t]*\d+\.[ \t]+.+(?:\n|$))+/gm, block => {
          const items = block.trim().split(/\n/).map(l =>
            '<li>' + l.replace(/^[ \t]*\d+\.[ \t]+/, '') + '</li>').join('');
          return '<ol>' + items + '</ol>\n';
        });
        // Paragraph wrap: double newlines = paragraph break; single
        // inside = <br>.  Block-level tags we already produced pass
        // through as-is.
        s = s.split(/\n{2,}/).map(p => {
          const t = p.trim();
          if (!t) return '';
          if (/^(<(h[1-6]|ul|ol|pre|blockquote)|\u0000CB)/i.test(t)) return t;
          return '<p>' + t.replace(/\n/g, '<br>') + '</p>';
        }).filter(Boolean).join('\n');
        // Restore code fences.
        s = s.replace(/\u0000CB(\d+)\u0000/g, (_, i) => blocks[+i]);
        return s;
      };
    })();

    // rAF-coalesced re-render: schedule at most one render per browser
    // paint frame even if tokens arrive faster than that.
    function makeThrottledRenderer(el) {
      let raw = '';
      let pending = false;
      const paint = () => { pending = false; el.innerHTML = md2html(raw); };
      return {
        set(text) {
          raw = text;
          if (pending) return;
          pending = true;
          requestAnimationFrame(paint);
        },
        flush() {
          pending = false;
          el.innerHTML = md2html(raw);
        },
        raw: () => raw
      };
    }

    function addMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + (role === 'user' ? 'user' : 'asst');
      const r = document.createElement('div');
      r.className = 'role';
      r.textContent = role;
      wrap.appendChild(r);
      const body = document.createElement('div');
      body.className = 'body';
      if (text) body.textContent = text;   // <-- fix: actually write the text
      wrap.appendChild(body);
      thread.appendChild(wrap);
      window.scrollTo(0, document.body.scrollHeight);
      return { wrap, body };
    }

    // Tags we treat as terminators (close everything, never open a section).
    // <|im_end|> marks turn end; <|endoftext|> marks stream end.
    const TERMINATOR_TAGS = new Set(['im_end', 'endoftext']);

    // Generic tag-aware stream splitter.
    //
    // Any <|…|>, <tag>, or </tag> encountered in the stream is treated as
    // a section boundary.  Content *between* boundaries flows into the
    // currently-open section — "" (plain) if none.
    //
    // While a tagged section is open, its body is rendered as a compact
    // single-line marquee (shows the last ~160 chars).  When the section
    // closes (because a different tag opened, or an explicit </tag>, or
    // the stream ended), its box collapses into a <details> summary so
    // you can click to expand the full content.
    //
    // The "plain" section (no tag) always renders full text normally.
    class SectionStreamer {
      constructor(host) {
        this.host = host;          // element to append sections into
        this.cur  = null;          // { tag, text, el, sbody } | null
        this.buf  = '';
        this.finalText = '';       // accumulated plain-section text (for history)
        this.openPlain();
      }

      openPlain() { this.open(''); }

      open(tag) {
        if (this.cur) this.close();
        const el = document.createElement('div');
        const sbody = document.createElement('div');
        sbody.className = 'sbody';
        if (tag === '') {
          el.className = 'plain';
          el.appendChild(sbody);
        } else {
          el.className = 'sect streaming';
          const head = document.createElement('div');
          head.className = 'sect-head';
          head.textContent = tag;
          el.appendChild(head);
          el.appendChild(sbody);
        }
        this.host.appendChild(el);
        /* Plain sections render markdown via the throttled renderer.
         * Tagged sections stay plain text while streaming (compact). */
        const render = tag === '' ? makeThrottledRenderer(sbody) : null;
        this.cur = { tag, text: '', el, sbody, render };
      }

      close() {
        const s = this.cur;
        this.cur = null;
        if (!s) return;
        if (s.tag === '') {
          /* Flush any pending rAF so the final state reflects every
           * byte we received (would otherwise get stuck on the last
           * pre-frame snapshot if no more tokens arrive). */
          if (s.render) s.render.flush();
          return;
        }
        // If the section was empty OR only whitespace, drop it —
        // some thinking-mode models emit `<think>\n</think>` with
        // no reasoning at all, which would otherwise show up as a
        // useless "think · 1 chars" pill.
        if (s.text.trim().length === 0) {
          s.el.remove();
          return;
        }
        // Replace streaming box with a collapsible <details>.
        const det = document.createElement('details');
        det.className = 'sect done';
        const sum = document.createElement('summary');
        const preview = s.text.replace(/\s+/g, ' ').trim().slice(0, 70);
        sum.textContent = s.tag + ' · ' + s.text.length + ' chars' +
                          (preview ? ' — ' + preview + (s.text.length > 70 ? '…' : '') : '');
        const body = document.createElement('div');
        body.className = 'sbody';
        body.textContent = s.text;
        det.appendChild(sum);
        det.appendChild(body);
        s.el.replaceWith(det);
      }

      emitText(t) {
        if (!this.cur) this.openPlain();
        this.cur.text += t;
        if (this.cur.tag === '') {
          this.finalText += t;
          /* Plain body gets markdown-rendered, rAF-coalesced so burst
           * token arrivals don't thrash the DOM. */
          this.cur.render.set(this.cur.text);
        } else {
          /* Tagged section stays plain text, compact tail. */
          this.cur.sbody.textContent = this.cur.text.slice(-160);
        }
        window.scrollTo(0, document.body.scrollHeight);
      }

      push(chunk) {
        this.buf += chunk;
        while (true) {
          // Find the earliest tag-opening marker.
          const i1 = this.buf.indexOf('<|');
          const i2 = this.buf.indexOf('</');
          const i3 = this.findPlainOpen();          // <word>
          let idx  = Math.min(
            i1 < 0 ? Infinity : i1,
            i2 < 0 ? Infinity : i2,
            i3 < 0 ? Infinity : i3
          );
          if (!isFinite(idx)) {
            // No tag start; hold back a few trailing chars in case a tag
            // is forming across chunk boundaries.  "<|im_start|>" is 13
            // chars at most (safe margin of 16).
            const safe = this.buf.length - 16;
            if (safe > 0) {
              this.emitText(this.buf.slice(0, safe));
              this.buf = this.buf.slice(safe);
            }
            return;
          }
          if (idx > 0) {
            this.emitText(this.buf.slice(0, idx));
            this.buf = this.buf.slice(idx);
          }
          // Parse the tag at head-of-buffer.
          const consumed = this.tryConsumeTag();
          if (consumed === 0) {
            // Tag looks started but is incomplete — wait for more data.
            return;
          }
        }
      }

      findPlainOpen() {
        // Match `<[a-zA-Z]…>` but not `<|…|>` or `</…>` (handled separately).
        const re = /<[a-zA-Z][^<>|]{0,32}>/;
        const m = re.exec(this.buf);
        return m ? m.index : -1;
      }

      // Returns # of chars consumed from buf, or 0 if not enough data.
      tryConsumeTag() {
        if (this.buf.startsWith('<|')) {
          const end = this.buf.indexOf('|>');
          if (end === -1) return 0;
          const tag = this.buf.slice(2, end);
          this.buf = this.buf.slice(end + 2);
          this.handleTag(tag, 'pipe');
          return 1;
        }
        if (this.buf.startsWith('</')) {
          const end = this.buf.indexOf('>');
          if (end === -1) return 0;
          const tag = this.buf.slice(2, end);
          this.buf = this.buf.slice(end + 1);
          this.handleTag(tag, 'close');
          return 1;
        }
        if (this.buf.startsWith('<')) {
          const end = this.buf.indexOf('>');
          if (end === -1) return 0;
          const tag = this.buf.slice(1, end);
          this.buf = this.buf.slice(end + 1);
          this.handleTag(tag, 'open');
          return 1;
        }
        return 0;
      }

      handleTag(tag, kind) {
        if (kind === 'close') {
          // </x>: close current tagged section, return to plain.  Don't
          // open redundant new plain sections on repeated close tags.
          if (this.cur && this.cur.tag !== '') {
            this.close();
            this.openPlain();
          }
          return;
        }
        // Recognized terminators (<|im_end|>, <|endoftext|>) — close
        // whatever's open, don't open a new section.
        if (TERMINATOR_TAGS.has(tag)) {
          if (this.cur && this.cur.tag !== '') {
            // Unclosed <think> before a turn-end is almost always actually
            // the answer — promote it to plain instead of collapsing as
            // thinking content.
            if (this.cur.tag === 'think') this.promoteToPlain();
            else this.close();
            this.openPlain();
          }
          return;
        }
        // Everything else opens a new named section.
        this.open(tag);
      }

      // Convert the currently-open tagged section into plain content.
      // Used when the model forgot to emit </think> before end-of-turn.
      promoteToPlain() {
        const s = this.cur;
        this.cur = null;
        if (!s) return;
        s.el.remove();
        this.finalText += s.text;
        this.openPlain();
        this.cur.text = s.text;
        this.cur.sbody.textContent = s.text;
      }

      end() {
        if (this.buf.length) {
          this.emitText(this.buf);
          this.buf = '';
        }
        if (this.cur) {
          if (this.cur.tag !== '') this.close();
          else if (this.cur.render) this.cur.render.flush();
        }
      }
    }

    async function send() {
      const userText = input.value.trim();
      if (!userText) return;
      const maxTokens   = parseInt($('max').value, 10) || 512;
      const temp        = parseFloat($('temp').value);
      const topP        = parseFloat($('top_p').value);

      history.push({ role: 'user', content: userText });
      addMsg('user', userText);
      input.value = '';
      sendBtn.disabled = true;
      statusEl.textContent = '…connecting';

      const asst   = addMsg('assistant', '');
      const stream = new SectionStreamer(asst.body);

      try {
        // OpenAI-compatible payload: server renders the Qwen3 ChatML
        // template itself, so we just hand it the full message history.
        const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
        for (const m of history) messages.push({ role: m.role, content: m.content });
        const resp = await fetch('/apps/maroon/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'qwen3',
            messages,
            stream: true,
            max_tokens: maxTokens,
            temperature: temp,
            top_p: topP,
          }),
        });

        if (!resp.ok) {
          asst.body.textContent = 'HTTP ' + resp.status + ': ' + (await resp.text());
          return;
        }

        const reader = resp.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        statusEl.textContent = 'streaming';
        let promptReported = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += dec.decode(value, { stream: true });

          let idx;
          while ((idx = buf.indexOf('\n\n')) !== -1) {
            const raw = buf.slice(0, idx);
            buf = buf.slice(idx + 2);
            if (!raw.startsWith('data: ')) continue;
            const payload = raw.slice(6);
            if (payload === '[DONE]') {
              statusEl.textContent = 'done';
              continue;
            }
            let evt;
            try { evt = JSON.parse(payload); } catch (e) { continue; }
            // OpenAI chat.completion.chunk shape
            const ch = evt.choices && evt.choices[0];
            if (!ch) continue;
            const delta = ch.delta || {};
            if (typeof delta.content === 'string' && delta.content.length) {
              if (!promptReported) { statusEl.textContent = 'streaming'; promptReported = true; }
              stream.push(delta.content);
            }
            if (ch.finish_reason) statusEl.textContent = 'done (' + ch.finish_reason + ')';
          }
        }
        stream.end();
        history.push({ role: 'assistant', content: stream.finalText });
      } catch (e) {
        statusEl.textContent = 'error';
        asst.body.textContent = (asst.body.textContent || '') + '\n[fetch error: ' + e.message + ']';
      } finally {
        sendBtn.disabled = false;
      }
    }

    form.addEventListener('submit', (e) => { e.preventDefault(); send(); });
    // Enter = send · Shift+Enter = newline
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        send();
      }
    });
    input.focus();
  </script>
</body>
</html>
