<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>claw</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; }
    .container { max-width: 800px; margin: 0 auto; padding: 24px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #fff; }
    h1 span { color: #666; font-weight: 400; }
    h2 { font-size: 14px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 32px 0 12px; }
    .card { background: #141414; border: 1px solid #222; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    label { font-size: 13px; color: #888; width: 110px; flex-shrink: 0; }
    input[type=text], input[type=password] {
      flex: 1; background: #0a0a0a; border: 1px solid #333; border-radius: 4px;
      padding: 8px 10px; color: #e0e0e0; font-size: 13px; font-family: monospace;
    }
    input:focus, textarea:focus { outline: none; border-color: #555; }
    input.masked { color: #555; }
    textarea {
      width: 100%; background: #0a0a0a; border: 1px solid #333; border-radius: 4px;
      padding: 8px 10px; color: #e0e0e0; font-size: 13px; font-family: monospace;
      resize: vertical; min-height: 80px;
    }
    select {
      background: #0a0a0a; border: 1px solid #333; border-radius: 4px;
      padding: 6px 10px; color: #e0e0e0; font-size: 13px;
    }
    button {
      background: #222; border: 1px solid #333; border-radius: 4px; color: #e0e0e0;
      padding: 6px 14px; font-size: 13px; cursor: pointer;
    }
    button:hover { background: #333; }
    button.primary { background: #1a3a2a; border-color: #2a5a3a; }
    button.primary:hover { background: #2a5a3a; }
    button.danger { background: #3a1a1a; border-color: #5a2a2a; }
    button.danger:hover { background: #5a2a2a; }
    .tag { display: inline-block; background: #1a2a3a; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin: 2px; }
    .tag .x { cursor: pointer; margin-left: 4px; color: #888; }
    .tag .x:hover { color: #fff; }
    .status { font-size: 12px; color: #555; margin-top: 4px; }
    .status.ok { color: #4a8; }
    .status.err { color: #a44; }
    .ctx-tab { display: inline-block; padding: 6px 12px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; }
    .ctx-tab.active { color: #fff; border-color: #4a8; }
    .tabs { border-bottom: 1px solid #222; margin-bottom: 12px; }
    .scroll-box { max-height: 300px; overflow-y: auto; }
    .filter-input { width: 100%; background: #0a0a0a; border: 1px solid #333; border-radius: 4px; padding: 6px 10px; color: #e0e0e0; font-size: 12px; margin-bottom: 8px; }
    .perm-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #1a1a1a; }
    .perm-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    .perm-badge.open { background: #1a3a2a; color: #4a8; }
    .perm-badge.wl { background: #2a2a2a; color: #888; }
    .model-item { padding: 8px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
    .model-item:hover { background: #1a1a1a; }
    .model-item.selected { background: #1a2a3a; border-left: 2px solid #4a8; }
    .model-name { font-size: 13px; color: #e0e0e0; font-weight: 500; }
    .model-slug { font-size: 11px; color: #666; font-family: monospace; }
    .model-meta { font-size: 11px; color: #555; margin-top: 2px; }
    .model-meta span { margin-right: 12px; }
    .model-meta .free { color: #4a8; }
    .toggle-row { display: flex; align-items: center; gap: 8px; }
    .toggle { position: relative; width: 36px; height: 20px; background: #333; border-radius: 10px; cursor: pointer; }
    .toggle.on { background: #2a5a3a; }
    .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: #888; border-radius: 50%; transition: .2s; }
    .toggle.on::after { left: 18px; background: #4a8; }
    .bot-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 12px 16px; background: #141414; border: 1px solid #222; border-radius: 8px; }
    .bot-selector select { flex: 1; font-size: 14px; padding: 8px; }
    .bot-selector .default-badge { font-size: 10px; color: #4a8; background: #1a3a2a; padding: 2px 6px; border-radius: 3px; }
  </style>
</head>
<body>
<div class="container">
  <h1>%claw <span>llm agent harness</span></h1>

  <div class="bot-selector">
    <label style="width:auto">Bot</label>
    <select id="bot-select" onchange="switchBot()"></select>
    <span id="default-badge" class="default-badge" style="display:none">default</span>
    <button onclick="showAddBot()">+ New</button>
    <button onclick="setDefaultBot()">Set Default</button>
    <button class="danger" onclick="showDelBot()">Delete</button>
  </div>
  <div id="add-bot-row" style="display:none;margin-top:8px">
    <div class="row">
      <input type="text" id="new-bot-id" placeholder="bot id (lowercase, no spaces)" style="flex:1">
      <button class="primary" onclick="confirmAddBot()">Create</button>
      <button onclick="cancelAddBot()">Cancel</button>
    </div>
  </div>
  <div id="del-bot-confirm" style="display:none;margin-top:8px">
    <div class="row">
      <span style="color:#a44;font-size:13px" id="del-bot-msg"></span>
      <button class="danger" onclick="confirmDelBot()">Confirm Delete</button>
      <button onclick="cancelDelBot()">Cancel</button>
    </div>
  </div>

  <h2>Global Defaults</h2>
  <div class="card">
    <div class="row">
      <label>OpenRouter Key</label>
      <input type="text" id="api-key" placeholder="sk-or-v1-..." onfocus="clearMasked(this)">
      <button onclick="setKey()">Set</button>
    </div>
    <div class="row">
      <label>Default Model</label>
      <input type="text" id="model" placeholder="anthropic/claude-sonnet-4" style="flex:1" >
      <button onclick="setModel()">Set</button>
    </div>
    <div style="margin-top:8px">
      <div class="row">
        <input type="text" class="filter-input" id="model-filter" placeholder="Filter models..." oninput="filterModels()" style="margin-bottom:0;flex:1">
        <div class="toggle-row">
          <div class="toggle" id="free-toggle" onclick="toggleFree()"></div>
          <span style="font-size:12px;color:#888">Free only</span>
        </div>
      </div>
      <div class="scroll-box" id="model-list" style="max-height:200px;margin-top:8px">
        <span style="color:#555;font-size:13px">Set an API key to browse models</span>
      </div>
    </div>
    <div class="row">
      <label>Brave Key</label>
      <input type="text" id="brave-key" placeholder="BSA..." onfocus="clearMasked(this)">
      <button onclick="setBraveKey()">Set</button>
    </div>
    <div class="status" id="config-status"></div>
  </div>

  <h2>Bot Identity</h2>
  <div class="card">
    <div class="row">
      <label>Name</label>
      <input type="text" id="bot-name" placeholder="Required — at least one letter">
      <button onclick="setBotName()">Set</button>
    </div>
    <div class="row">
      <label>Avatar</label>
      <input type="text" id="bot-avatar" placeholder="https://... (optional)">
      <button onclick="setBotAvatar()">Set</button>
    </div>
    <div class="row">
      <label>Model Override</label>
      <input type="text" id="bot-model" placeholder="(uses global default)" style="flex:1" >
      <button onclick="setBotModel()">Set</button>
      <button onclick="clearBotModel()">Clear</button>
    </div>
    <div style="margin-top:8px">
      <div class="row">
        <input type="text" class="filter-input" id="bot-model-filter" placeholder="Filter models..." oninput="filterBotModels()" style="margin-bottom:0;flex:1">
        <div class="toggle-row">
          <div class="toggle" id="bot-free-toggle" onclick="toggleBotFree()"></div>
          <span style="font-size:12px;color:#888">Free only</span>
        </div>
      </div>
      <div class="scroll-box" id="bot-model-list" style="max-height:200px;margin-top:8px"></div>
    </div>
    <div class="status" id="bot-status"></div>
  </div>

  <h2>Whitelist</h2>
  <div class="card">
    <div id="whitelist-tags"></div>
    <div class="row" style="margin-top:8px">
      <input type="text" id="new-ship" placeholder="~sampel-palnet">
      <select id="new-role">
        <option value="owner">owner</option>
        <option value="allowed">allowed</option>
      </select>
      <button class="primary" onclick="addShip()">Add</button>
    </div>
  </div>

  <h2>Channel Permissions</h2>
  <div class="card">
    <input type="text" class="filter-input" id="chan-filter" placeholder="Filter channels..." oninput="filterChannels()">
    <div class="scroll-box" id="channel-list"><span style="color:#555;font-size:13px">Loading...</span></div>
    <div class="status" id="perm-status"></div>
  </div>

  <h2>Scheduled Tasks</h2>
  <div class="card">
    <div id="cron-list"></div>
    <div style="margin-top:12px;border-top:1px solid #222;padding-top:12px">
      <div class="row"><label>Schedule</label><input type="text" id="cron-schedule" placeholder="*/30 * * * *" style="width:160px"><span style="font-size:11px;color:#555;margin-left:4px">min hr dom mon dow</span></div>
      <div class="row"><label>Prompt</label><input type="text" id="cron-prompt" placeholder="Check for updates and summarize"></div>
      <div class="row"><button class="primary" onclick="addCron()">Add Task</button></div>
    </div>
    <div class="status" id="cron-status"></div>
  </div>

  <h2>Context Files</h2>
  <div class="card">
    <div class="tabs" id="ctx-tabs"></div>
    <textarea id="ctx-editor" rows="8"></textarea>
    <div class="row" style="margin-top:8px;justify-content:space-between">
      <div>
        <input type="text" id="new-ctx-key" placeholder="new field name" style="width:150px">
        <button onclick="addCtx()">Add Field</button>
      </div>
      <div>
        <button class="danger" onclick="delCtx()">Delete</button>
        <button class="primary" onclick="saveCtx()">Save</button>
      </div>
    </div>
    <div class="status" id="ctx-status"></div>
  </div>

</div>

<script>
const API = '/apps/claw/api';
let ctx = {};
let activeCtxTab = null;
let allChannels = [];
let currentBot = null;
let defaultBotId = null;
let botList = {};

async function api(path) {
  const r = await fetch(API + path, {credentials: 'include'});
  return r.json();
}

async function post(body) {
  const r = await fetch(API + '/action', {
    method: 'POST', credentials: 'include',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify(body)
  });
  return r.json();
}

function status(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (ok ? 'ok' : 'err');
  setTimeout(() => el.textContent = '', 3000);
}

function maskKey(key) {
  if (!key || key.length < 4) return '';
  return '\u2022'.repeat(8) + key.slice(-3);
}
function showMasked(el, key) {
  if (!key) { el.value = ''; el.classList.remove('masked'); return; }
  el.value = maskKey(key);
  el.classList.add('masked');
  el.dataset.hasKey = '1';
}
function clearMasked(el) {
  if (el.dataset.hasKey === '1') {
    el.value = '';
    el.classList.remove('masked');
    delete el.dataset.hasKey;
  }
}

// Bot selector
async function loadBots() {
  const data = await api('/bots');
  botList = data.bots || {};
  defaultBotId = data.default || 'default';
  const sel = document.getElementById('bot-select');
  const prev = currentBot;
  sel.innerHTML = Object.entries(botList).map(([id, b]) =>
    `<option value="${id}">${b.name || id}${id === defaultBotId ? ' (default)' : ''}</option>`
  ).join('');
  if (prev && botList[prev]) sel.value = prev;
  else if (sel.options.length) sel.value = sel.options[0].value;
  currentBot = sel.value;
  document.getElementById('default-badge').style.display = currentBot === defaultBotId ? '' : 'none';
}

function switchBot() {
  currentBot = document.getElementById('bot-select').value;
  document.getElementById('default-badge').style.display = currentBot === defaultBotId ? '' : 'none';
  loadBotConfig();
}

function showAddBot() {
  document.getElementById('add-bot-row').style.display = '';
  document.getElementById('new-bot-id').focus();
}
function cancelAddBot() {
  document.getElementById('add-bot-row').style.display = 'none';
  document.getElementById('new-bot-id').value = '';
}
async function confirmAddBot() {
  const id = document.getElementById('new-bot-id').value.trim().toLowerCase().replace(/\s+/g, '-');
  if (!id) return;
  try {
    await post({action: 'add-bot', id});
    cancelAddBot();
    await loadBots();
    document.getElementById('bot-select').value = id;
    currentBot = id;
    loadBotConfig();
    status('bot-status', `Bot "${id}" created`, true);
  } catch(e) { status('bot-status', 'Failed to create bot', false); }
}

function showDelBot() {
  if (!currentBot) return;
  if (currentBot === defaultBotId) return status('bot-status', 'Cannot delete default bot', false);
  document.getElementById('del-bot-msg').textContent = `Delete bot "${currentBot}"?`;
  document.getElementById('del-bot-confirm').style.display = '';
}
function cancelDelBot() {
  document.getElementById('del-bot-confirm').style.display = 'none';
}
async function confirmDelBot() {
  cancelDelBot();
  await post({action: 'del-bot', id: currentBot});
  await loadBots();
  loadBotConfig();
}

async function setDefaultBot() {
  if (!currentBot) return;
  await post({action: 'set-default-bot', id: currentBot});
  defaultBotId = currentBot;
  await loadBots();
  status('bot-status', `"${currentBot}" is now the default bot`, true);
}

// Model browser
let allModels = [];
let freeOnly = false;
let botFreeOnly = false;
let cachedApiKey = '';

async function fetchModels(apiKey) {
  if (!apiKey || apiKey.length < 10) return;
  if (cachedApiKey === apiKey && allModels.length > 0) { renderModels(); renderBotModels(); return; }
  cachedApiKey = apiKey;
  try {
    const r = await fetch('https://openrouter.ai/api/v1/models', {
      headers: { 'Authorization': `Bearer ${apiKey}` }
    });
    if (!r.ok) return;
    const data = await r.json();
    allModels = (data.data || []).sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    renderModels();
    renderBotModels();
  } catch(e) { console.warn('model fetch failed:', e); }
}

function fmtCost(v) {
  const n = parseFloat(v || '0');
  if (n === 0) return 'free';
  return '$' + (n * 1_000_000).toFixed(2);
}

function renderModelList(models, targetEl, inputField, freeFlag, selectFn) {
  const filter = (document.getElementById(inputField).value || '').toLowerCase();
  let filtered = models.filter(m =>
    (m.name || '').toLowerCase().includes(filter) ||
    (m.id || '').toLowerCase().includes(filter)
  );
  if (freeFlag) filtered = filtered.filter(m => parseFloat(m.pricing?.prompt || '1') === 0);
  if (!filtered.length) { targetEl.innerHTML = '<span style="color:#555;font-size:13px">No models found</span>'; return; }
  targetEl.innerHTML = filtered.slice(0, 50).map(m => {
    const promptCost = fmtCost(m.pricing?.prompt);
    const compCost = fmtCost(m.pricing?.completion);
    const ctx = m.context_length ? (m.context_length / 1000).toFixed(0) + 'k' : '?';
    const isFree = parseFloat(m.pricing?.prompt || '1') === 0;
    return `<div class="model-item" onclick="${selectFn}('${m.id}')">
      <div class="model-name">${m.name || m.id}</div>
      <div class="model-slug">${m.id}</div>
      <div class="model-meta">
        <span>in: ${promptCost}/M</span>
        <span>out: ${compCost}/M</span>
        <span>ctx: ${ctx}</span>
        ${isFree ? '<span class="free">FREE</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

function renderModels() {
  renderModelList(allModels, document.getElementById('model-list'), 'model-filter', freeOnly, 'selectGlobalModel');
}
function renderBotModels() {
  renderModelList(allModels, document.getElementById('bot-model-list'), 'bot-model-filter', botFreeOnly, 'selectBotModel');
}
function filterModels() { renderModels(); }
function filterBotModels() { renderBotModels(); }
function toggleFree() {
  freeOnly = !freeOnly;
  document.getElementById('free-toggle').classList.toggle('on', freeOnly);
  renderModels();
}
function toggleBotFree() {
  botFreeOnly = !botFreeOnly;
  document.getElementById('bot-free-toggle').classList.toggle('on', botFreeOnly);
  renderBotModels();
}
function selectGlobalModel(id) {
  document.getElementById('model').value = id;
  document.getElementById('model-filter').value = '';
}
function selectBotModel(id) {
  document.getElementById('bot-model').value = id;
  document.getElementById('bot-model-filter').value = '';
}
async function clearBotModel() {
  document.getElementById('bot-model').value = '';
  await post({action: 'bot-set-model', id: currentBot, model: ''});
  status('bot-status', 'Using global default model', true);
}

// Global config
async function loadGlobalConfig() {
  const c = await api('/config');
  document.getElementById('model').value = c.model || '';
  showMasked(document.getElementById('api-key'), c['api-key'] || '');
  showMasked(document.getElementById('brave-key'), c['brave-key'] || '');
  if (c['api-key']) fetchModels(c['api-key']);
}

async function setKey() {
  const el = document.getElementById('api-key');
  const key = el.value;
  if (!key || el.dataset.hasKey === '1') return;
  await post({action: 'set-key', key});
  showMasked(el, key);
  status('config-status', 'API key set', true);
  cachedApiKey = '';
  fetchModels(key);
}
async function setModel() {
  const m = document.getElementById('model').value;
  if (!m) return;
  await post({action: 'set-model', model: m});
  status('config-status', 'Default model updated', true);
}
async function setBraveKey() {
  const el = document.getElementById('brave-key');
  const key = el.value;
  if (!key || el.dataset.hasKey === '1') return;
  await post({action: 'set-brave-key', key});
  showMasked(el, key);
  status('config-status', 'Brave key set', true);
}

// Per-bot config
async function loadBotConfig() {
  if (!currentBot) return;
  const c = await api(`/bot/${currentBot}/config`);
  document.getElementById('bot-name').value = c.name || '';
  document.getElementById('bot-avatar').value = c.avatar || '';
  document.getElementById('bot-model').value = c.model || '';
  renderWhitelist(c.whitelist || {});
  // Reload per-bot sections
  loadBotContext();
  loadChannels();
  loadCrons();
}

function renderWhitelist(wl) {
  const el = document.getElementById('whitelist-tags');
  el.innerHTML = Object.entries(wl).map(([s, r]) =>
    `<span class="tag">${s} (${r}) <span class="x" onclick="delShip('${s}')">&times;</span></span>`
  ).join('') || '<span style="color:#555;font-size:13px">No ships whitelisted</span>';
}

async function setBotName() {
  const name = document.getElementById('bot-name').value;
  if (!name) return status('bot-status', 'Name is required', false);
  await post({action: 'bot-set-name', id: currentBot, name});
  await loadBots();
  status('bot-status', 'Name set to: ' + name, true);
}
async function setBotAvatar() {
  const avatar = document.getElementById('bot-avatar').value;
  await post({action: 'bot-set-avatar', id: currentBot, avatar});
  status('bot-status', avatar ? 'Avatar set' : 'Avatar cleared', true);
}
async function setBotModel() {
  const m = document.getElementById('bot-model').value;
  await post({action: 'bot-set-model', id: currentBot, model: m || ''});
  status('bot-status', m ? 'Model override: ' + m : 'Using global default', true);
}

async function addShip() {
  const ship = document.getElementById('new-ship').value;
  const role = document.getElementById('new-role').value;
  if (!ship) return;
  await post({action: 'bot-add-ship', id: currentBot, ship, role});
  document.getElementById('new-ship').value = '';
  loadBotConfig();
}
async function delShip(ship) {
  await post({action: 'bot-del-ship', id: currentBot, ship});
  loadBotConfig();
}

// Channel Permissions (per-bot)
async function loadChannels() {
  const el = document.getElementById('channel-list');
  try {
    const c = await api(`/bot/${currentBot}/config`);
    // channel-perms not in bot config endpoint yet, use main for now
    const perms = {}; // TODO: add per-bot channel-perms endpoint
    allChannels = [];
    try {
      const r = await fetch('/~/scry/groups/groups/light.json', {credentials: 'include'});
      if (r.ok) {
        const groups = await r.json();
        for (const [flag, group] of Object.entries(groups || {})) {
          const gtitle = group?.meta?.title || flag;
          const chans = group?.channels || {};
          for (const [nest, ch] of Object.entries(chans)) {
            if (!nest.startsWith('chat/')) continue;
            allChannels.push({nest, title: ch?.meta?.title || nest, gtitle, perm: perms[nest] || 'whitelist'});
          }
        }
      }
    } catch(e) {}
    renderChannels();
  } catch(e) {
    el.innerHTML = '<span style="color:#a44">Error loading channels</span>';
  }
}
function renderChannels() {
  const el = document.getElementById('channel-list');
  const filter = (document.getElementById('chan-filter').value || '').toLowerCase();
  const filtered = allChannels.filter(c =>
    c.nest.toLowerCase().includes(filter) || c.title.toLowerCase().includes(filter) || c.gtitle.toLowerCase().includes(filter)
  );
  if (!filtered.length) { el.innerHTML = '<span style="color:#555;font-size:13px">No channels found</span>'; return; }
  el.innerHTML = filtered.map(c => {
    const isOpen = c.perm === 'open';
    const badge = isOpen
      ? `<span class="perm-badge open" onclick="togglePerm('${c.nest}','whitelist')">open</span>`
      : `<span class="perm-badge wl" onclick="togglePerm('${c.nest}','open')">whitelist</span>`;
    return `<div class="perm-row"><div><div style="font-size:13px;color:#e0e0e0">${c.title}${c.gtitle ? ' <span style="color:#555">in '+c.gtitle+'</span>' : ''}</div><div style="font-size:11px;color:#555;font-family:monospace">${c.nest}</div></div>${badge}</div>`;
  }).join('');
}
function filterChannels() { renderChannels(); }
async function togglePerm(channel, newPerm) {
  await post({action: 'bot-set-channel-perm', id: currentBot, channel, perm: newPerm});
  const ch = allChannels.find(c => c.nest === channel);
  if (ch) ch.perm = newPerm;
  renderChannels();
  status('perm-status', channel.split('/').pop() + ' -> ' + newPerm, true);
}

// Cron Jobs (per-bot)
async function loadCrons() {
  const el = document.getElementById('cron-list');
  try {
    const jobs = await api('/cron-jobs'); // TODO: per-bot cron endpoint
    if (!jobs.length) { el.innerHTML = '<span style="color:#555;font-size:13px">No scheduled tasks</span>'; return; }
    el.innerHTML = jobs.map(j => `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1a1a"><div style="flex:1;min-width:0"><div style="font-size:12px;color:#4a8;font-family:monospace">${j.schedule||'?'}</div><div style="font-size:13px;color:#e0e0e0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${j.prompt}</div></div><button class="danger" onclick="removeCron(${j.id})" style="font-size:11px;padding:3px 8px;margin-left:8px;flex-shrink:0">&times;</button></div>`).join('');
  } catch(e) { el.innerHTML = '<span style="color:#a44">Error loading tasks</span>'; }
}
async function addCron() {
  const schedule = document.getElementById('cron-schedule').value.trim();
  const prompt = document.getElementById('cron-prompt').value.trim();
  if (!schedule || !prompt) return status('cron-status', 'Schedule and prompt required', false);
  if (schedule.split(/\s+/).length !== 5) return status('cron-status', 'Need 5 fields: min hour dom month dow', false);
  await post({action: 'bot-cron-add', id: currentBot, schedule, prompt});
  document.getElementById('cron-schedule').value = '';
  document.getElementById('cron-prompt').value = '';
  status('cron-status', 'Task scheduled', true);
  loadCrons();
}
async function removeCron(id) {
  await post({action: 'bot-cron-remove', id: currentBot, 'cron-id': id});
  status('cron-status', 'Task removed', true);
  loadCrons();
}

// Context Files (per-bot)
async function loadBotContext() {
  if (!currentBot) return;
  ctx = await api(`/bot/${currentBot}/context`);
  activeCtxTab = null;
  renderCtxTabs();
}
function renderCtxTabs() {
  const tabs = document.getElementById('ctx-tabs');
  const keys = Object.keys(ctx);
  if (!activeCtxTab && keys.length) activeCtxTab = keys[0];
  tabs.innerHTML = keys.map(k =>
    `<span class="ctx-tab ${k===activeCtxTab?'active':''}" onclick="selectCtx('${k}')">${k}</span>`
  ).join('');
  if (activeCtxTab && ctx[activeCtxTab] !== undefined) {
    document.getElementById('ctx-editor').value = ctx[activeCtxTab];
  } else {
    document.getElementById('ctx-editor').value = '';
  }
}
function selectCtx(k) { activeCtxTab = k; renderCtxTabs(); }
async function saveCtx() {
  if (!activeCtxTab) return;
  const content = document.getElementById('ctx-editor').value;
  await post({action: 'bot-set-context', id: currentBot, field: activeCtxTab, content});
  ctx[activeCtxTab] = content;
  status('ctx-status', `${activeCtxTab} saved`, true);
}
async function delCtx() {
  if (!activeCtxTab) return;
  await post({action: 'bot-del-context', id: currentBot, field: activeCtxTab});
  delete ctx[activeCtxTab];
  activeCtxTab = Object.keys(ctx)[0] || null;
  renderCtxTabs();
  status('ctx-status', 'Deleted', true);
}
async function addCtx() {
  const key = document.getElementById('new-ctx-key').value.trim();
  if (!key) return;
  await post({action: 'bot-set-context', id: currentBot, field: key, content: ''});
  ctx[key] = '';
  activeCtxTab = key;
  document.getElementById('new-ctx-key').value = '';
  renderCtxTabs();
}

// Init
async function init() {
  await loadBots();
  await loadGlobalConfig();
  await loadBotConfig();
}
init();
</script>
